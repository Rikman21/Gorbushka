server {
    listen 80;
    server_name api.4-0.xn--p1ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.4-0.xn--p1ai;

    ssl_certificate /etc/letsencrypt/live/api.4-0.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.4-0.xn--p1ai/privkey.pem;

    # --- user-service ---
    location /api/user {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    location /api/become_supplier {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }
    location /api/supplier/stats {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }
    # supplier profile (GET /api/supplier?supplier_id=)
    location = /api/supplier {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }
    location /api/admin/users {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }
    location /api/admin/user {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }
    location /api/admin/user/block {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }
    location /api/admin/supplier_requests {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
    }

    # --- catalog-service ---
    location /api/catalog {
        proxy_pass http://catalog-service:8082;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    location /api/offers {
        proxy_pass http://catalog-service:8082;
        proxy_set_header Host $host;
    }
    location /api/supplier/offers {
        proxy_pass http://catalog-service:8082;
        proxy_set_header Host $host;
    }
    location /api/supplier/template {
        proxy_pass http://catalog-service:8082;
        proxy_set_header Host $host;
    }
    location /api/supplier/import {
        proxy_pass http://catalog-service:8082;
        proxy_set_header Host $host;
        client_max_body_size 10M;
    }

    # --- deal-service ---
    location /api/deals {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/deal {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/price_request {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/price_requests {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/buyer {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/reviews {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/user/reviews {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/buyer_requests {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/admin/deals {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }
    location /api/admin/reviews {
        proxy_pass http://deal-service:8083;
        proxy_set_header Host $host;
    }

    # --- static frontend ---
    location / {
        root /etc/nginx/html;
        index index.html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # health check
    location /health {
        return 200 "OK";
    }
}
