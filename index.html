<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Биржа Apple техники</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #E1E3E8; color: #1C1C1E;
      -webkit-font-smoothing: antialiased; line-height: 1.5;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, select, textarea { font: inherit; border: none; outline: none; color: inherit; }
    a { text-decoration: none; color: inherit; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .shell {
      width: 100%; max-width: 430px; min-height: 100vh;
      background: #F0F2F5; position: relative; margin: 0 auto;
    }
    @media (min-width: 768px) {
      body { padding: 24px; display: flex; justify-content: center; }
      .shell { min-height: 0; height: 932px; border-radius: 40px; overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,.2); }
    }

    /* Header */
    .app-header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(240,242,245,.85);
      -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 36px; height: 36px; border-radius: 10px; background: #007AFF;
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .header-title { font-size: 16px; font-weight: 700; color: #1C1C1E; }
    .header-sub { font-size: 11px; color: #8E8E93; }
    .header-role-badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    }
    .header-role-badge.buyer { background: rgba(0,122,255,.1); color: #007AFF; }
    .header-role-badge.supplier { background: rgba(52,199,89,.1); color: #34C759; }
    .header-role-badge.admin { background: rgba(255,149,0,.1); color: #FF9500; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; z-index: 50;
    }
    .bottom-nav-inner {
      background: rgba(255,255,255,.8);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      backdrop-filter: blur(48px) saturate(180%);
      border-top: 1px solid rgba(0,0,0,.05);
      padding: 8px 8px 24px;
    }
    .nav-items { display: flex; align-items: center; justify-content: space-around; }
    .nav-tab {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 4px 12px; color: #8E8E93;
      transition: color .15s, transform .1s; min-width: 60px;
    }
    .nav-tab:active { transform: scale(0.9); }
    .nav-tab.active { color: #007AFF; }
    .nav-tab svg { stroke-width: 1.6px; }
    .nav-tab.active svg { stroke-width: 2.2px; }
    .nav-label { font-size: 10px; font-weight: 500; }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #007AFF; margin-top: 2px; opacity: 0; transition: opacity .2s; }
    .nav-tab.active .nav-dot { opacity: 1; }
    .nav-badge {
      position: absolute; top: -2px; right: -2px; min-width: 16px; height: 16px;
      border-radius: 8px; background: #FF3B30; color: #fff;
      font-size: 9px; font-weight: 700; padding: 0 3px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-icon-wrap { position: relative; }

    /* Screens */
    .screen { display: none; padding-bottom: 90px; }
    .screen.active { display: block; }

    /* Toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,.85); color: #fff; padding: 10px 18px; border-radius: 12px;
      font-size: 13px; font-weight: 500; z-index: 200; opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; white-space: nowrap;
      max-width: 320px; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Role Overlay */
    .role-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: #F0F2F5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    .role-overlay.hidden { display: none; }
    .role-logo { width: 72px; height: 72px; border-radius: 20px; background: #007AFF;
      display: flex; align-items: center; justify-content: center; color: #fff; margin-bottom: 20px; }
    .role-title { font-size: 24px; font-weight: 800; color: #1C1C1E; text-align: center; margin-bottom: 8px; }
    .role-sub { font-size: 15px; color: #8E8E93; text-align: center; margin-bottom: 32px; line-height: 1.4; }
    .role-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
    .role-card {
      background: #fff; border-radius: 20px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      display: flex; align-items: center; gap: 16px;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer; text-align: left;
    }
    .role-card:active { transform: scale(0.97); }
    .role-icon { width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .role-icon.blue { background: rgba(0,122,255,.1); }
    .role-icon.green { background: rgba(52,199,89,.1); }
    .role-card-title { font-size: 16px; font-weight: 700; color: #1C1C1E; }
    .role-card-desc { font-size: 13px; color: #8E8E93; margin-top: 2px; }

    /* Cards & Lists */
    .page-title { font-size: 22px; font-weight: 800; color: #1C1C1E; padding: 20px 16px 12px; letter-spacing: -0.3px; }
    .section-pad { padding: 0 16px; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      margin-bottom: 10px;
    }
    .card-body { padding: 14px; }

    /* Product cards (buyer feed) */
    .product-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      margin-bottom: 10px; overflow: hidden;
      transition: transform .15s;
      cursor: pointer;
    }
    .product-card:active { transform: scale(0.98); }
    .product-card-inner { display: flex; gap: 12px; padding: 14px; align-items: flex-start; }
    .product-img {
      width: 80px; height: 80px; border-radius: 12px;
      background: linear-gradient(135deg, #E8EBF0, #D0D3DA);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 15px; font-weight: 700; color: #1C1C1E; line-height: 1.25; }
    .product-meta { font-size: 12px; color: #8E8E93; margin-top: 3px; }
    .product-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
    }
    .badge-verified { background: rgba(52,199,89,.12); color: #34C759; }
    .badge-new { background: rgba(255,149,0,.12); color: #FF9500; }
    .badge-top { background: rgba(0,122,255,.12); color: #007AFF; }
    .product-price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .product-price { font-size: 16px; font-weight: 800; color: #1C1C1E; }
    .product-price.hidden { font-size: 13px; font-weight: 600; color: #8E8E93; font-style: italic; }
    .product-rating { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #8E8E93; }

    /* Filter chips */
    .filter-bar { padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      background: #fff; color: #8E8E93;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      transition: background .15s, color .15s;
      cursor: pointer;
    }
    .chip.active { background: #007AFF; color: #fff; }

    /* Offer row */
    .offer-row {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .offer-supplier-info { flex: 1; min-width: 0; }
    .offer-company { font-size: 14px; font-weight: 600; color: #1C1C1E; }
    .offer-city { font-size: 12px; color: #8E8E93; margin-top: 2px; }
    .offer-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #8E8E93; margin-top: 4px; }
    .offer-price-col { text-align: right; }
    .offer-price { font-size: 16px; font-weight: 800; color: #1C1C1E; white-space: nowrap; }
    .btn-sm {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      transition: background .15s, transform .1s;
    }
    .btn-sm:active { transform: scale(0.95); }
    .btn-primary { background: #007AFF; color: #fff; }
    .btn-secondary { background: rgba(0,122,255,.1); color: #007AFF; }
    .btn-orange { background: rgba(255,149,0,.12); color: #FF9500; }
    .btn-red { background: rgba(255,59,48,.1); color: #FF3B30; }
    .btn-green { background: rgba(52,199,89,.1); color: #34C759; }
    .btn-full {
      width: 100%; height: 50px; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .1s, background .15s;
    }
    .btn-full:active { transform: scale(0.97); }

    /* Deal card */
    .deal-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
    }
    .deal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .deal-id { font-size: 12px; color: #8E8E93; font-weight: 500; }
    .status-pill {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px;
    }
    .status-created { background: rgba(0,122,255,.1); color: #007AFF; }
    .status-confirmed { background: rgba(52,199,89,.1); color: #34C759; }
    .status-completed { background: rgba(52,199,89,.15); color: #34C759; }
    .status-rejected, .status-cancelled { background: rgba(255,59,48,.1); color: #FF3B30; }
    .status-pending { background: rgba(255,149,0,.1); color: #FF9500; }
    .deal-product { font-size: 14px; font-weight: 600; color: #1C1C1E; }
    .deal-meta { font-size: 12px; color: #8E8E93; margin-top: 3px; }
    .deal-price { font-size: 15px; font-weight: 700; color: #1C1C1E; margin-top: 6px; }
    .deal-actions { display: flex; gap: 8px; margin-top: 10px; }

    /* My Offer card (supplier) */
    .my-offer-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
    }
    .my-offer-header { display: flex; align-items: center; justify-content: space-between; }
    .my-offer-name { font-size: 14px; font-weight: 700; color: #1C1C1E; }
    .my-offer-price { font-size: 16px; font-weight: 800; color: #1C1C1E; }
    .my-offer-price.hidden-price { color: #8E8E93; font-size: 13px; text-decoration: line-through; }
    .my-offer-meta { font-size: 12px; color: #8E8E93; margin-top: 4px; }
    .my-offer-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    /* Profile */
    .profile-hero {
      background: #fff; border-radius: 16px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04); margin-bottom: 12px;
    }
    .profile-avatar {
      width: 60px; height: 60px; border-radius: 18px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 24px; font-weight: 800; flex-shrink: 0;
    }
    .profile-name { font-size: 18px; font-weight: 700; color: #1C1C1E; margin-top: 12px; }
    .profile-meta { font-size: 13px; color: #8E8E93; margin-top: 3px; }
    .stats-row { display: flex; gap: 8px; margin-top: 16px; }
    .stat-box {
      flex: 1; background: #F8F9FA; border-radius: 12px; padding: 12px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .stat-val { font-size: 18px; font-weight: 800; color: #1C1C1E; }
    .stat-lbl { font-size: 10px; color: #8E8E93; font-weight: 500; text-align: center; }
    .review-item {
      background: #F8F9FA; border-radius: 12px; padding: 12px; margin-bottom: 8px;
    }
    .review-header { display: flex; align-items: center; justify-content: space-between; }
    .review-author { font-size: 13px; font-weight: 600; color: #1C1C1E; }
    .review-rating { display: flex; gap: 2px; }
    .star { font-size: 12px; }
    .review-text { font-size: 12px; color: #8E8E93; margin-top: 6px; }
    .settings-list { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); margin-bottom: 12px; }
    .settings-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,.04); cursor: pointer;
      transition: background .1s;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: rgba(0,0,0,.02); }
    .settings-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .settings-icon.blue { background: rgba(0,122,255,.1); color: #007AFF; }
    .settings-icon.green { background: rgba(52,199,89,.1); color: #34C759; }
    .settings-icon.orange { background: rgba(255,149,0,.1); color: #FF9500; }
    .settings-icon.red { background: rgba(255,59,48,.1); color: #FF3B30; }
    .settings-title { font-size: 15px; font-weight: 500; color: #1C1C1E; }
    .settings-sub { font-size: 12px; color: #8E8E93; margin-top: 1px; }
    .section-title { font-size: 13px; font-weight: 600; color: #8E8E93; text-transform: uppercase; letter-spacing: 0.4px; padding: 16px 16px 8px; }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 500; color: #8E8E93; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; height: 46px; border-radius: 12px; background: #E8EBF0;
      padding: 0 14px; font-size: 15px; color: #1C1C1E;
      transition: box-shadow .15s;
    }
    .form-input:focus { box-shadow: 0 0 0 2px rgba(0,122,255,.25); }
    .form-input::placeholder { color: rgba(142,142,147,.6); }
    .form-select {
      width: 100%; height: 46px; border-radius: 12px; background: #E8EBF0;
      padding: 0 14px; font-size: 15px; color: #1C1C1E; appearance: none;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-textarea {
      width: 100%; border-radius: 12px; background: #E8EBF0;
      padding: 12px 14px; font-size: 15px; color: #1C1C1E; resize: none;
      transition: box-shadow .15s;
    }
    .form-textarea:focus { box-shadow: 0 0 0 2px rgba(0,122,255,.25); }

    /* Bottom Sheet */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 80;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
    .bottom-sheet {
      position: fixed; left: 50%; bottom: 0; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px; z-index: 81;
      background: #fff; border-radius: 24px 24px 0 0;
      max-height: 90vh; overflow: hidden;
      transition: transform .35s cubic-bezier(.32,.72,0,1);
    }
    .bottom-sheet.show { transform: translateX(-50%) translateY(0); }
    .sheet-handle { display: flex; justify-content: center; padding: 12px 0 8px; }
    .sheet-handle-bar { width: 40px; height: 4px; border-radius: 9999px; background: #E5E5EA; }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 14px; border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .sheet-title { font-size: 17px; font-weight: 700; color: #1C1C1E; }
    .sheet-close {
      width: 32px; height: 32px; border-radius: 50%; background: #E8EBF0; color: #8E8E93;
      display: flex; align-items: center; justify-content: center;
    }
    .sheet-body { padding: 20px 20px 40px; overflow-y: auto; max-height: calc(90vh - 80px); }

    /* Rating modal */
    .stars-input { display: flex; gap: 8px; margin: 16px 0; }
    .star-btn {
      font-size: 32px; cursor: pointer; opacity: .3; transition: opacity .15s, transform .1s;
    }
    .star-btn.active { opacity: 1; }
    .star-btn:active { transform: scale(1.2); }

    /* Admin tabs */
    .admin-tabs { display: flex; gap: 4px; padding: 8px 16px; overflow-x: auto; }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .admin-tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 600; color: #8E8E93;
      background: #fff; transition: background .15s, color .15s;
      cursor: pointer;
    }
    .admin-tab.active { background: #007AFF; color: #fff; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px; text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
    .empty-title { font-size: 17px; font-weight: 700; color: #1C1C1E; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: #8E8E93; line-height: 1.5; }

    /* Search bar */
    .search-wrap { padding: 8px 16px 4px; }
    .search-inner { position: relative; }
    .search-input {
      width: 100%; height: 38px; border-radius: 12px; background: #E8EBF0;
      padding: 0 14px 0 36px; font-size: 14px; color: #1C1C1E;
    }
    .search-input::placeholder { color: #8E8E93; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #8E8E93; }

    /* Spinner */
    .spinner {
      width: 24px; height: 24px; border: 2px solid #E8EBF0; border-top-color: #007AFF;
      border-radius: 50%; animation: spin .6s linear infinite; margin: 40px auto; display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Request card */
    .request-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
    }
    .request-timer { font-size: 12px; font-weight: 600; color: #FF9500; display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>
<div class="shell" id="shell">

  <!-- Role Selection Overlay -->
  <div class="role-overlay" id="roleOverlay">
    <div class="role-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </div>
    <div class="role-title">Биржа Apple техники</div>
    <div class="role-sub">Выберите свою роль, чтобы продолжить</div>
    <div class="role-cards">
      <button class="role-card" id="roleBuyer">
        <div class="role-icon blue">🛒</div>
        <div>
          <div class="role-card-title">Покупатель</div>
          <div class="role-card-desc">Ищите лучшие предложения от поставщиков</div>
        </div>
      </button>
      <button class="role-card" id="roleSupplier">
        <div class="role-icon green">📦</div>
        <div>
          <div class="role-card-title">Поставщик</div>
          <div class="role-card-desc">Продавайте технику оптом через биржу</div>
        </div>
      </button>
    </div>
  </div>

  <!-- App Header -->
  <header class="app-header" id="appHeader" style="display:none">
    <div class="header-inner">
      <div class="header-left">
        <div class="header-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </div>
        <div>
          <div class="header-title">Биржа</div>
          <div class="header-sub" id="headerSub">Apple техника</div>
        </div>
      </div>
      <span class="header-role-badge" id="headerRoleBadge"></span>
    </div>
  </header>

  <!-- ===== BUYER SCREENS ===== -->

  <!-- Screen: Feed -->

    <div class="page-title">Новый оффер</div>
    <div class="section-pad">

  <!-- Screen: My Profile (supplier) -->

  <!-- Screen: Supplier Profile (buyer views) -->

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>

  <!-- Screen: Buyer Profile -->

  <!-- ===== ADMIN SCREEN ===== -->

    <div class="admin-tabs" id="adminTabs">
      <button class="admin-tab active" data-tab="adminSupplierReqs" onclick="switchAdminTab(this)">Поставщики</button>
      <button class="admin-tab" data-tab="adminDeals" onclick="switchAdminTab(this)">Сделки</button>
      <button class="admin-tab" data-tab="adminComplaints" onclick="switchAdminTab(this)">Жалобы</button>

  <!-- Bottom Sheet for Quantity / Price Request -->

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div>

<script>
const API_BASE = 'http://45.131.43.120:8080';
const ADMIN_IDS = ['210419', '464896073'];

const tg = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user;
const urlParams = new URLSearchParams(window.location.search);
const userId = tgUser ? String(tgUser.id) : (urlParams.get('uid') || null);

let currentUser = null;
let isSupplier = false;
let isAdmin = false;
let currentScreen = null;
let screenHistory = [];
let activeOffer = null; // selected offer for buy/request flow
let activeCatalogItem = null; // selected catalog item for offer list

// ===== Toast =====
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===== Navigation =====
function buildNav() {
  const nav = document.getElementById('navItems');
  const tabs = isAdmin
    ? (isSupplier ? getSupplierTabs() : getBuyerTabs()).concat([{id:'screenAdmin',icon:adminIcon(),label:'Админ'}])
    : (isSupplier ? getSupplierTabs() : getBuyerTabs());

  nav.innerHTML = tabs.map(t => `
    <button class="nav-tab" data-screen="${t.id}" onclick="navTo('${t.id}')">
      <div class="nav-icon-wrap">${t.icon}</div>
      <span class="nav-label">${t.label}</span>
      <div class="nav-dot"></div>
    </button>
  `).join('');
}

function getBuyerTabs() {
  return [
    {id:'screenFeed', icon: homeIcon(), label:'Лента'},
    {id:'screenRequests', icon: requestIcon(), label:'Запросы'},
    {id:'screenBuyerProfile', icon: profileIcon(), label:'Профиль'},
  ];
}
function getSupplierTabs() {
  return [
    {id:'screenMyOffers', icon: offersIcon(), label:'Офферы'},
    {id:'screenIncoming', icon: requestIcon(), label:'Входящие'},
    {id:'screenSupplierDeals', icon: dealsIcon(), label:'Сделки'},
    {id:'screenMyProfile', icon: profileIcon(), label:'Профиль'},
  ];
}
function homeIcon() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'; }
function offersIcon() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'; }
function requestIcon() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'; }
function dealsIcon() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>'; }
function profileIcon() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'; }
function adminIcon() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'; }

function navTo(screenId) {
  screenHistory = [];
  showScreen(screenId, false);
  // refresh
  if (screenId === 'screenFeed') loadFeed();
  else if (screenId === 'screenRequests') { loadPriceRequests(); loadBuyerDeals(); }
  else if (screenId === 'screenMyOffers') loadMyOffers();
  else if (screenId === 'screenIncoming') { loadIncomingRequests(); loadIncomingDeals(); }
  else if (screenId === 'screenSupplierDeals') loadSupplierDeals();
  else if (screenId === 'screenMyProfile') loadMyProfile();
  else if (screenId === 'screenBuyerProfile') loadBuyerProfile();
  else if (screenId === 'screenAdmin') loadAdminTab('adminSupplierReqs');
}

function showScreen(id, pushHistory = true) {
  if (pushHistory && currentScreen) screenHistory.push(currentScreen);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  currentScreen = id;
  // Update nav highlight
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.screen === id);
  });
}

function goBack() {
  if (screenHistory.length) {
    const prev = screenHistory.pop();
    showScreen(prev, false);
  } else {
    // go to default
    navTo(isSupplier ? 'screenMyOffers' : 'screenFeed');
  }
}

// ===== Sheet =====
function openSheet(title, bodyHtml) {
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetBody').innerHTML = bodyHtml;
  document.getElementById('sheetBackdrop').classList.add('show');
  document.getElementById('mainSheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('mainSheet').classList.remove('show');
}

// ===== API =====
async function api(path, opts = {}) {
  const r = await fetch(API_BASE + path, {
    headers: {'Content-Type': 'application/json'},
    ...opts
  });
  if (!r.ok) { const e = await r.json().catch(() => ({error: r.statusText})); throw new Error(e.error || r.statusText); }
  return r.json();
}

// ===== Supplier Badges =====
function getSupplierBadges(s) {
  const badges = [];
  if (s.is_verified) badges.push('<span class="badge badge-verified">✓ Проверен</span>');
  if (s.created_at) {
    const days = (Date.now() - new Date(s.created_at)) / 86400000;
    if (days < 30) badges.push('<span class="badge badge-new">Новый</span>');
  }
  if (s.rating >= 4.8 && s.deals_count >= 5) badges.push('<span class="badge badge-top">Топ рейтинг</span>');
  return badges.join('');
}

function starsHtml(rating) {
  if (!rating) return '<span style="color:#8E8E93;font-size:12px">Нет оценок</span>';
  const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
  return `<span style="color:#FF9500;font-size:12px">${stars}</span> <span style="font-size:12px;color:#8E8E93">${(+rating).toFixed(1)}</span>`;
}

function dealStatusLabel(status) {
  const map = {
    created: ['Новая', 'status-created'],
    confirmed: ['Подтверждена', 'status-confirmed'],
    completed: ['Завершена', 'status-completed'],
    rejected: ['Отклонена', 'status-rejected'],
    cancelled: ['Отменена', 'status-cancelled'],
  };
  const [label, cls] = map[status] || [status, 'status-created'];
  return `<span class="status-pill ${cls}">${label}</span>`;
}

// ===== FEED =====
let feedData = [];
let feedFilter = {memory: '', search: ''};

async function loadFeed() {
  const el = document.getElementById('feedList');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const params = new URLSearchParams();
    if (feedFilter.memory) params.set('memory', feedFilter.memory);
    if (feedFilter.search) params.set('model', feedFilter.search);
    feedData = await api('/api/catalog?' + params.toString());
    renderFeed();
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Ошибка загрузки</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

function renderFeed() {
  const el = document.getElementById('feedList');
  if (!feedData.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Нет предложений</div><div class="empty-sub">Попробуйте изменить фильтр</div></div>';
    return;
  }
  el.innerHTML = feedData.map(item => `
    <div class="product-card" onclick="openCatalogItem(${item.id}, '${esc(item.model)} ${esc(item.memory || '')}')">
      <div class="product-card-inner">
        <div class="product-img">📱</div>
        <div class="product-info">
          <div class="product-name">${esc(item.brand || '')} ${esc(item.model || '')}</div>
          <div class="product-meta">${esc(item.memory || '')} ${esc(item.color || '')}</div>
          <div class="product-price-row">
            <div>
              ${item.min_price ? `<div class="product-price">от ${item.min_price.toLocaleString('ru')} ₽</div>` : '<div class="product-price hidden">Запросить цену</div>'}
            </div>
            <div class="product-rating">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="#FF9500" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              ${item.offers_count || 0} поставщ.
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openCatalogItem(catalogId, name) {
  activeCatalogItem = {id: catalogId, name};
  document.getElementById('offerListTitle').textContent = name;
  showScreen('screenOfferList');
  loadOfferList(catalogId);
}

async function loadOfferList(catalogId) {
  const el = document.getElementById('offerListContent');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const offers = await api('/api/catalog/' + catalogId + '/offers');
    if (!offers.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Нет предложений</div></div>';
      return;
    }
    el.innerHTML = offers.map(o => `
      <div class="offer-row">
        <div class="offer-supplier-info">
          <div class="offer-company">${esc(o.company_name || o.full_name || 'Поставщик')}</div>
          <div class="offer-city">${esc(o.city || '')}</div>
          <div class="offer-rating">${starsHtml(o.rating)} &nbsp;·&nbsp; ${o.deals_count || 0} сделок</div>
          <div class="product-badges" style="margin-top:6px">${getSupplierBadges(o)}</div>
        </div>
        <div class="offer-price-col">
          ${o.price_hidden ? `
            <div style="font-size:12px;color:#8E8E93;margin-bottom:6px">Цена скрыта</div>
            <button class="btn-sm btn-orange" onclick="openRequestPriceSheet(${o.id})">Запросить</button>
          ` : `
            <div class="offer-price">${(o.price||0).toLocaleString('ru')} ₽</div>
            <div style="font-size:11px;color:#8E8E93;margin:3px 0">${o.quantity || 0} шт</div>
            <button class="btn-sm btn-primary" onclick="openBuySheet(${JSON.stringify(o).replace(/"/g,'&quot;')})">Купить</button>
          `}
        </div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

// ===== Buy Sheet =====
function openBuySheet(offer) {
  activeOffer = offer;
  openSheet('Оформить покупку', `
    <div style="margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:#1C1C1E">${esc(offer.model||'')} ${esc(offer.memory||'')} ${esc(offer.color||'')}</div>
      <div style="font-size:13px;color:#8E8E93;margin-top:4px">${esc(offer.company_name||'Поставщик')}</div>
    </div>
    <div style="background:#F8F9FA;border-radius:14px;padding:14px;margin-bottom:20px">
      <div style="font-size:24px;font-weight:800;color:#1C1C1E">${(offer.price||0).toLocaleString('ru')} ₽ <span style="font-size:14px;font-weight:500;color:#8E8E93">за шт</span></div>
      <div style="font-size:13px;color:#8E8E93;margin-top:4px">В наличии: ${offer.quantity || 0} шт</div>
    </div>
    <div class="form-group">
      <label class="form-label">Количество</label>
      <div style="display:flex;align-items:center;gap:16px">
        <button onclick="changeQty(-1)" style="width:40px;height:40px;border-radius:12px;background:#E8EBF0;font-size:20px;display:flex;align-items:center;justify-content:center">-</button>
        <span id="buyQty" style="font-size:20px;font-weight:700;min-width:40px;text-align:center">1</span>
        <button onclick="changeQty(1)" style="width:40px;height:40px;border-radius:12px;background:#E8EBF0;font-size:20px;display:flex;align-items:center;justify-content:center">+</button>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:14px;color:#8E8E93">Итого:</span>
      <span id="buyTotal" style="font-size:18px;font-weight:800;color:#1C1C1E">${(offer.price||0).toLocaleString('ru')} ₽</span>
    </div>
    <button class="btn-full btn-primary" onclick="submitBuy()">Купить</button>
  `);
}

let buyQty = 1;
function changeQty(delta) {
  buyQty = Math.max(1, buyQty + delta);
  const el = document.getElementById('buyQty');
  if (el) el.textContent = buyQty;
  const tot = document.getElementById('buyTotal');
  if (tot && activeOffer) tot.textContent = ((activeOffer.price||0) * buyQty).toLocaleString('ru') + ' ₽';
}

async function submitBuy() {
  if (!userId || !activeOffer) { showToast('Ошибка: нет userId'); return; }
  try {
    // Create deal via API → then notify via bot sendData
    const r = await api('/api/deals', {
      method: 'POST',
      body: JSON.stringify({buyer_id: parseInt(userId), offer_id: activeOffer.id, quantity: buyQty})
    });

function renderDealCard(d, role) {
  const canConfirm = role === 'supplier' && d.status === 'created';
  const canReject = (role === 'supplier' && ['created','confirmed'].includes(d.status)) || (role === 'buyer' && d.status === 'created');
  const canComplete = role === 'buyer' && d.status === 'confirmed';
  return `
    <div class="deal-card">
      <div class="deal-header">
        <div class="deal-id">#${d.id} · ${new Date(d.created_at).toLocaleDateString('ru')}</div>
        ${dealStatusLabel(d.status)}
      </div>
      <div class="deal-product">${esc(d.model||'')} ${esc(d.memory||'')} ${esc(d.color||'')}</div>
      <div class="deal-meta">${role==='buyer'?'Поставщик: '+esc(d.counterparty||''):'Покупатель: '+esc(d.counterparty||'')}</div>
      <div class="deal-price">${(d.total_price||0).toLocaleString('ru')} ₽ · ${d.quantity} шт</div>
      <div class="deal-actions">
        ${canConfirm ? `<button class="btn-sm btn-green" onclick="updateDealStatus(${d.id},'confirmed')">Подтвердить</button>` : ''}
        ${canComplete ? `<button class="btn-sm btn-green" onclick="updateDealStatus(${d.id},'completed')">Завершить</button>` : ''}
        ${canReject ? `<button class="btn-sm btn-red" onclick="updateDealStatus(${d.id},'${role==='buyer'?'cancelled':'rejected'}')">Отклонить</button>` : ''}
        ${d.status === 'completed' && !d._reviewed ? `<button class="btn-sm btn-secondary" onclick="openRatingSheet(${d.id}, ${d.supplier_id})">Оценить</button>` : ''}
      </div>
    </div>`;
}

async function updateDealStatus(dealId, status) {
  if (!userId) return;
  try {

      method: 'POST',
      body: JSON.stringify({user_id: parseInt(userId), status})
    });

    if (isSupplier) { loadIncomingDeals(); loadSupplierDeals(); }
    else { loadBuyerDeals(); loadPriceRequests(); }
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

function downloadTemplate() {
  window.open(API_BASE + '/api/supplier/template', '_blank');
}

async function uploadImport() {
  const file = document.getElementById('importFile')?.files[0];
  if (!file || !userId) return;
  const fd = new FormData();
  fd.append('telegram_id', userId);
  fd.append('file', file);
  try {
    const r = await fetch(API_BASE + '/api/supplier/import', {method:'POST', body: fd});
    const data = await r.json();
    closeSheet();
    showToast(data.message || '✅ Импорт выполнен');
    loadMyOffers();
  } catch(e) {
    showToast('Ошибка импорта: ' + e.message);
  }
}

// ===== ADMIN =====
let activeAdminTab = 'adminSupplierReqs';
function switchAdminTab(btn) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const tabId = btn.dataset.tab;
  document.querySelectorAll('#screenAdmin .section-pad > div').forEach(el => el.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
  activeAdminTab = tabId;
  loadAdminTab(tabId);
}

async function loadAdminTab(tabId) {
  if (tabId === 'adminSupplierReqs') await loadAdminSupplierReqs();
  else if (tabId === 'adminDeals') await loadAdminDeals();
  else if (tabId === 'adminUsers') await loadAdminUsers();
}

async function loadAdminSupplierReqs() {
  const el = document.getElementById('adminSupplierReqs');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const reqs = await api('/api/admin/supplier_requests?admin_id=' + userId);
    if (!reqs.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Нет заявок</div></div>'; return; }
    el.innerHTML = reqs.map(r => `
      <div class="card" style="margin-bottom:10px">
        <div class="card-body">
          <div style="font-size:14px;font-weight:700">${esc(r.company_name)}</div>
          <div style="font-size:12px;color:#8E8E93">ID: ${r.telegram_id} · @${r.username||''} · ${r.city}</div>
          <div style="font-size:12px;color:#8E8E93">${r.phone}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
            <span class="status-pill ${r.status==='pending'?'status-pending':r.status==='approved'?'status-confirmed':'status-rejected'}">${r.status}</span>
          </div>
          ${r.status === 'pending' ? `
          <div class="deal-actions" style="margin-top:10px">
            <button class="btn-sm btn-green" onclick="adminApproveSupplier(${r.telegram_id})">Одобрить</button>
            <button class="btn-sm btn-red" onclick="adminRejectSupplier(${r.telegram_id})">Отклонить</button>
          </div>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function adminApproveSupplier(telegramId) {
  try {
    // Use become_supplier flow — approve via bot callback. Here just update role.
    await api('/api/admin/user/role', {method:'POST', body: JSON.stringify({admin_id: parseInt(userId), telegram_id: telegramId, role: 'supplier'})});
    showToast('✅ Поставщик одобрен');
    loadAdminSupplierReqs();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function adminRejectSupplier(telegramId) {
  showToast('Заявка будет отклонена через бот-команду');
}

async function loadAdminDeals() {
  const el = document.getElementById('adminDeals');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const deals = await api('/api/admin/deals?admin_id=' + userId);
    if (!deals.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Нет сделок</div></div>'; return; }
    el.innerHTML = deals.map(d => `
      <div class="deal-card">
        <div class="deal-header">
          <div class="deal-id">#${d.id} · ${new Date(d.created_at).toLocaleDateString('ru')}</div>
          ${dealStatusLabel(d.status)}
        </div>
        <div class="deal-product">${esc(d.model||'')} ${esc(d.memory||'')} ${esc(d.color||'')}</div>
        <div class="deal-meta">Покупатель: ${esc(d.buyer_name||d.buyer_username||'')} → Поставщик: ${esc(d.supplier_company||'')}</div>
        <div class="deal-price">${(d.total_price||0).toLocaleString('ru')} ₽</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function loadAdminUsers() {
  const el = document.getElementById('adminUsers');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const users = await api('/api/admin/users?admin_id=' + userId);
    el.innerHTML = users.map(u => `
      <div class="card" style="margin-bottom:8px">
        <div class="card-body" style="display:flex;align-items:center;gap:12px">
          <div>
            <div style="font-size:14px;font-weight:600">${esc(u.full_name||u.username||'Пользователь')}</div>
            <div style="font-size:12px;color:#8E8E93">ID: ${u.telegram_id} · ${u.is_supplier?'Поставщик':'Покупатель'}</div>
          </div>
          <div style="display:flex;gap:6px;margin-left:auto">
            <button class="btn-sm btn-secondary" onclick="adminChangeRole(${u.telegram_id},'${u.is_supplier?'buyer':'supplier'}')">→ ${u.is_supplier?'Покупатель':'Поставщик'}</button>
            <button class="btn-sm btn-red" onclick="adminDeleteUser(${u.telegram_id})">✕</button>
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function adminChangeRole(telegramId, role) {
  try {
    await api('/api/admin/user/role', {method:'POST', body: JSON.stringify({admin_id: parseInt(userId), telegram_id: telegramId, role})});
    showToast('✅ Роль изменена');
    loadAdminUsers();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function adminDeleteUser(telegramId) {
  if (!confirm('Удалить пользователя?')) return;
  try {
    await fetch(API_BASE + `/api/admin/user/${telegramId}?admin_id=${userId}`, {method:'DELETE'});
    showToast('✅ Пользователь удалён');
    loadAdminUsers();
  } catch(e) { showToast('Ошибка'); }
}

// ===== Deals create API endpoint needed =====
// We need POST /api/deals in main.py — let's use the existing bot webApp handler approach
// For now create deal via special endpoint
async function createDealViaAPI(offerId, quantity) {
  // Main.py doesn't have POST /api/deals yet — use sendData via Telegram
  if (tg) {
    tg.sendData(`CREATE_DEAL|${offerId}|${quantity}`);
    return {ok: true};
  }
  throw new Error('Откройте через бот');
}

// Override submitBuy to use Telegram sendData
async function submitBuy() {
  if (!activeOffer) return;
  if (tg) {
    tg.sendData(`CREATE_DEAL|${activeOffer.id}|${buyQty}`);
    closeSheet();
    showToast('✅ Заявка отправлена!');
    return;
  }
  showToast('Откройте приложение через бот Telegram');
}

// ===== Utils =====
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateHeaderBadge() {
  const badge = document.getElementById('headerRoleBadge');
  const sub = document.getElementById('headerSub');
  if (isAdmin) { badge.textContent = 'Админ'; badge.className = 'header-role-badge admin'; }
  else if (isSupplier) { badge.textContent = 'Поставщик'; badge.className = 'header-role-badge supplier'; }
  else { badge.textContent = 'Покупатель'; badge.className = 'header-role-badge buyer'; }
  if (sub) sub.textContent = isSupplier ? 'Панель поставщика' : 'Apple техника';
}

// ===== INIT =====
async function init() {
  if (!userId) {
    document.getElementById('roleOverlay').innerHTML = `
      <div class="empty-state" style="padding-top:80px">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">Откройте через бот</div>
        <div class="empty-sub">Используйте команду /start в Telegram-боте для входа</div>
      </div>`;
    return;
  }

  try {
    currentUser = await api('/api/user?telegram_id=' + userId);
  } catch(e) {
    currentUser = null;
  }

  isAdmin = ADMIN_IDS.includes(String(userId));
  isSupplier = currentUser?.is_supplier === 1;
  const roleSelected = currentUser?.role_selected;

  // Show role overlay if not selected (and not admin)
  if (!roleSelected && !isAdmin) {
    document.getElementById('roleOverlay').classList.remove('hidden');

    document.getElementById('roleBuyer').onclick = async () => {
      await setRole('buyer');
    };
    document.getElementById('roleSupplier').onclick = async () => {
      await setRole('supplier');
    };
    return;
  }

  startApp();
}

async function setRole(role) {
  try {
    await api('/api/user/role', {
      method: 'POST',
      body: JSON.stringify({telegram_id: parseInt(userId), role})
    });
    isSupplier = role === 'supplier';
    if (currentUser) currentUser.is_supplier = isSupplier ? 1 : 0;
    document.getElementById('roleOverlay').classList.add('hidden');
    startApp();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

function startApp() {
  document.getElementById('roleOverlay').classList.add('hidden');
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('bottomNav').style.display = 'block';
  updateHeaderBadge();
  buildNav();

  if (isSupplier) {
    navTo('screenMyOffers');
    loadCatalogForCreate();
  } else {
    navTo('screenFeed');
  }
}

init();
</script>
