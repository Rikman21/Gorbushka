<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Биржа Apple техники</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #E1E3E8; color: #1C1C1E;
      -webkit-font-smoothing: antialiased; line-height: 1.5;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, select, textarea { font: inherit; border: none; outline: none; color: inherit; }
    a { text-decoration: none; color: inherit; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .shell {
      width: 100%; max-width: 430px; min-height: 100vh;
      background: #F0F2F5; position: relative; margin: 0 auto;
    }
    @media (min-width: 768px) {
      body { padding: 24px; display: flex; justify-content: center; }
      .shell { min-height: 0; height: 932px; border-radius: 40px; overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,.2); }
    }

    /* Header */
    .app-header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(240,242,245,.85);
      -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 36px; height: 36px; border-radius: 10px; background: #007AFF;
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .header-title { font-size: 16px; font-weight: 700; color: #1C1C1E; }
    .header-sub { font-size: 11px; color: #8E8E93; }
    .header-role-badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    }
    .header-role-badge.buyer { background: rgba(0,122,255,.1); color: #007AFF; }
    .header-role-badge.supplier { background: rgba(52,199,89,.1); color: #34C759; }
    .header-role-badge.admin { background: rgba(255,149,0,.1); color: #FF9500; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; z-index: 50;
    }
    .bottom-nav-inner {
      background: rgba(255,255,255,.8);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      backdrop-filter: blur(48px) saturate(180%);
      border-top: 1px solid rgba(0,0,0,.05);
      padding: 8px 8px 24px;
    }
    .nav-items { display: flex; align-items: center; justify-content: space-around; }
    .nav-tab {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 4px 12px; color: #8E8E93;
      transition: color .15s, transform .1s; min-width: 60px;
    }
    .nav-tab:active { transform: scale(0.9); }
    .nav-tab.active { color: #007AFF; }
    .nav-tab svg { stroke-width: 1.6px; }
    .nav-tab.active svg { stroke-width: 2.2px; }
    .nav-label { font-size: 10px; font-weight: 500; }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #007AFF; margin-top: 2px; opacity: 0; transition: opacity .2s; }
    .nav-tab.active .nav-dot { opacity: 1; }
    .nav-badge {
      position: absolute; top: -2px; right: -2px; min-width: 16px; height: 16px;
      border-radius: 8px; background: #FF3B30; color: #fff;
      font-size: 9px; font-weight: 700; padding: 0 3px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-icon-wrap { position: relative; }

    /* Screens */
    .screen { display: none; padding-bottom: 90px; }
    .screen.active { display: block; }

    /* Toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,.85); color: #fff; padding: 10px 18px; border-radius: 12px;
      font-size: 13px; font-weight: 500; z-index: 200; opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; white-space: nowrap;
      max-width: 320px; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Role Overlay */
    .role-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: #F0F2F5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    .role-overlay.hidden { display: none; }
    .role-logo { width: 72px; height: 72px; border-radius: 20px; background: #007AFF;
      display: flex; align-items: center; justify-content: center; color: #fff; margin-bottom: 20px; }
    .role-title { font-size: 24px; font-weight: 800; color: #1C1C1E; text-align: center; margin-bottom: 8px; }
    .role-sub { font-size: 15px; color: #8E8E93; text-align: center; margin-bottom: 32px; line-height: 1.4; }
    .role-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
    .role-card {
      background: #fff; border-radius: 20px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      display: flex; align-items: center; gap: 16px;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer; text-align: left;
    }
    .role-card:active { transform: scale(0.97); }
    .role-icon { width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .role-icon.blue { background: rgba(0,122,255,.1); }
    .role-icon.green { background: rgba(52,199,89,.1); }
    .role-card-title { font-size: 16px; font-weight: 700; color: #1C1C1E; }
    .role-card-desc { font-size: 13px; color: #8E8E93; margin-top: 2px; }

    /* Cards & Lists */
    .page-title { font-size: 22px; font-weight: 800; color: #1C1C1E; padding: 20px 16px 12px; letter-spacing: -0.3px; }
    .section-pad { padding: 0 16px; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      margin-bottom: 10px;
    }
    .card-body { padding: 14px; }

    /* Product cards (buyer feed) */
    .product-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      margin-bottom: 10px; overflow: hidden;
      transition: transform .15s;
      cursor: pointer;
    }
    .product-card:active { transform: scale(0.98); }
    .product-card-inner { display: flex; gap: 12px; padding: 14px; align-items: flex-start; }
    .product-img {
      width: 80px; height: 80px; border-radius: 12px;
      background: linear-gradient(135deg, #E8EBF0, #D0D3DA);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 15px; font-weight: 700; color: #1C1C1E; line-height: 1.25; }
    .product-meta { font-size: 12px; color: #8E8E93; margin-top: 3px; }
    .product-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
    }
    .badge-verified { background: rgba(52,199,89,.12); color: #34C759; }
    .badge-new { background: rgba(255,149,0,.12); color: #FF9500; }
    .badge-top { background: rgba(0,122,255,.12); color: #007AFF; }
    .product-price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .product-price { font-size: 16px; font-weight: 800; color: #1C1C1E; }
    .product-price.hidden { font-size: 13px; font-weight: 600; color: #8E8E93; font-style: italic; }
    .product-rating { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #8E8E93; }

    /* Grouped product card */
    .group-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      margin-bottom: 10px; overflow: hidden;
    }
    .group-header {
      display: flex; gap: 12px; padding: 14px; align-items: flex-start;
      cursor: pointer; transition: background .15s;
    }
    .group-header:active { background: #F5F5F7; }
    .group-info { flex: 1; min-width: 0; }
    .group-model { font-size: 15px; font-weight: 700; color: #1C1C1E; line-height: 1.25; }
    .group-meta { font-size: 12px; color: #8E8E93; margin-top: 3px; }
    .group-price { font-size: 16px; font-weight: 800; color: #1C1C1E; margin-top: 6px; }
    .group-stats { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .group-badge {
      font-size: 11px; font-weight: 600; color: #8E8E93;
      display: flex; align-items: center; gap: 3px;
    }
    .group-chevron {
      transition: transform .2s; flex-shrink: 0; color: #C7C7CC;
    }
    .group-card.open .group-chevron { transform: rotate(90deg); }
    .group-items {
      display: none; border-top: 1px solid #F0F0F3;
    }
    .group-card.open .group-items { display: block; }
    .group-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid #F5F5F7;
      cursor: pointer; transition: background .15s;
    }
    .group-item:last-child { border-bottom: none; }
    .group-item:active { background: #F5F5F7; }
    .group-item-name { font-size: 13px; font-weight: 500; color: #1C1C1E; }
    .group-item-sub { font-size: 11px; color: #8E8E93; margin-top: 2px; }
    .group-item-price { font-size: 14px; font-weight: 700; color: #1C1C1E; text-align: right; }
    .group-item-count { font-size: 11px; color: #8E8E93; text-align: right; margin-top: 2px; }

    /* Category accordion sections */
    .cat-section { margin-bottom: 4px; }
    .cat-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 0 8px; cursor: pointer; user-select: none;
    }
    .cat-header-emoji { font-size: 18px; }
    .cat-header-title { font-size: 15px; font-weight: 700; flex: 1; color: #1C1C1E; }
    .cat-header-count { font-size: 12px; color: #8E8E93; }
    .cat-chevron { transition: transform 0.2s; color: #C7C7CC; }
    .cat-section.collapsed .cat-chevron { transform: rotate(-90deg); }
    .cat-section.collapsed .cat-items { display: none; }

    /* Filter chips */
    .filter-bar { padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      background: #fff; color: #8E8E93;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      transition: background .15s, color .15s;
      cursor: pointer;
    }
    .chip.active { background: #007AFF; color: #fff; }

    /* Offer row */
    .offer-row {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .offer-supplier-info { flex: 1; min-width: 0; }
    .offer-company { font-size: 14px; font-weight: 600; color: #1C1C1E; }
    .offer-city { font-size: 12px; color: #8E8E93; margin-top: 2px; }
    .offer-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #8E8E93; margin-top: 4px; }
    .offer-price-col { text-align: right; }
    .offer-price { font-size: 16px; font-weight: 800; color: #1C1C1E; white-space: nowrap; }
    .btn-sm {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      transition: background .15s, transform .1s;
    }
    .btn-sm:active { transform: scale(0.95); }
    .btn-primary { background: #007AFF; color: #fff; }
    .btn-secondary { background: rgba(0,122,255,.1); color: #007AFF; }
    .btn-orange { background: rgba(255,149,0,.12); color: #FF9500; }
    .btn-red { background: rgba(255,59,48,.1); color: #FF3B30; }
    .btn-green { background: rgba(52,199,89,.1); color: #34C759; }
    .btn-full {
      width: 100%; height: 50px; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .1s, background .15s;
    }
    .btn-full:active { transform: scale(0.97); }

    /* Deal card */
    .deal-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
    }
    .deal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .deal-id { font-size: 12px; color: #8E8E93; font-weight: 500; }
    .status-pill {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px;
    }
    .status-created { background: rgba(0,122,255,.1); color: #007AFF; }
    .status-confirmed { background: rgba(52,199,89,.1); color: #34C759; }
    .status-completed { background: rgba(52,199,89,.15); color: #34C759; }
    .status-rejected, .status-cancelled { background: rgba(255,59,48,.1); color: #FF3B30; }
    .status-pending { background: rgba(255,149,0,.1); color: #FF9500; }
    .deal-product { font-size: 14px; font-weight: 600; color: #1C1C1E; }
    .deal-meta { font-size: 12px; color: #8E8E93; margin-top: 3px; }
    .deal-price { font-size: 15px; font-weight: 700; color: #1C1C1E; margin-top: 6px; }
    .deal-actions { display: flex; gap: 8px; margin-top: 10px; }

    /* My Offer card (supplier) */
    .my-offer-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      padding: 14px; margin-bottom: 10px;
    }
    .my-offer-header { display: flex; align-items: center; justify-content: space-between; }
    .my-offer-name { font-size: 14px; font-weight: 700; color: #1C1C1E; }
    .my-offer-price { font-size: 16px; font-weight: 800; color: #1C1C1E; }
    .my-offer-price.hidden-price { color: #8E8E93; font-size: 13px; text-decoration: line-through; }
    .my-offer-meta { font-size: 12px; color: #8E8E93; margin-top: 4px; }
    .my-offer-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    /* Profile */
    .profile-hero {
      background: #fff; border-radius: 16px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04); margin-bottom: 12px;
    }
    .profile-avatar {
      width: 60px; height: 60px; border-radius: 18px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 24px; font-weight: 800; flex-shrink: 0;
    }
    .profile-name { font-size: 18px; font-weight: 700; color: #1C1C1E; margin-top: 12px; }
    .profile-meta { font-size: 13px; color: #8E8E93; margin-top: 3px; }
    .stats-row { display: flex; gap: 8px; margin-top: 16px; }
    .stat-box {
      flex: 1; background: #F8F9FA; border-radius: 12px; padding: 12px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .stat-val { font-size: 18px; font-weight: 800; color: #1C1C1E; }
    .stat-lbl { font-size: 10px; color: #8E8E93; font-weight: 500; text-align: center; }
    .review-item {
      background: #F8F9FA; border-radius: 12px; padding: 12px; margin-bottom: 8px;
    }
    .review-header { display: flex; align-items: center; justify-content: space-between; }
    .review-author { font-size: 13px; font-weight: 600; color: #1C1C1E; }
    .review-rating { display: flex; gap: 2px; }
    .star { font-size: 12px; }
    .review-text { font-size: 12px; color: #8E8E93; margin-top: 6px; }
    .settings-list { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); margin-bottom: 12px; }
    .settings-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,.04); cursor: pointer;
      transition: background .1s;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: rgba(0,0,0,.02); }
    .settings-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .settings-icon.blue { background: rgba(0,122,255,.1); color: #007AFF; }
    .settings-icon.green { background: rgba(52,199,89,.1); color: #34C759; }
    .settings-icon.orange { background: rgba(255,149,0,.1); color: #FF9500; }
    .settings-icon.red { background: rgba(255,59,48,.1); color: #FF3B30; }
    .settings-title { font-size: 15px; font-weight: 500; color: #1C1C1E; }
    .settings-sub { font-size: 12px; color: #8E8E93; margin-top: 1px; }
    .section-title { font-size: 13px; font-weight: 600; color: #8E8E93; text-transform: uppercase; letter-spacing: 0.4px; padding: 16px 16px 8px; }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 500; color: #8E8E93; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; height: 46px; border-radius: 12px; background: #E8EBF0;
      padding: 0 14px; font-size: 15px; color: #1C1C1E;
      transition: box-shadow .15s;
    }
    .form-input:focus { box-shadow: 0 0 0 2px rgba(0,122,255,.25); }
    .form-input::placeholder { color: rgba(142,142,147,.6); }
    .form-select {
      width: 100%; height: 46px; border-radius: 12px; background: #E8EBF0;
      padding: 0 14px; font-size: 15px; color: #1C1C1E; appearance: none;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-textarea {
      width: 100%; border-radius: 12px; background: #E8EBF0;
      padding: 12px 14px; font-size: 15px; color: #1C1C1E; resize: none;
      transition: box-shadow .15s;
    }
    .form-textarea:focus { box-shadow: 0 0 0 2px rgba(0,122,255,.25); }

    /* Bottom Sheet */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 80;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
    .bottom-sheet {
      position: fixed; left: 50%; bottom: 0; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px; z-index: 81;
      background: #fff; border-radius: 24px 24px 0 0;
      max-height: 90vh; overflow: hidden;
      transition: transform .35s cubic-bezier(.32,.72,0,1);
    }
    .bottom-sheet.show { transform: translateX(-50%) translateY(0); }
    .sheet-handle { display: flex; justify-content: center; padding: 12px 0 8px; }
    .sheet-handle-bar { width: 40px; height: 4px; border-radius: 9999px; background: #E5E5EA; }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 14px; border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .sheet-title { font-size: 17px; font-weight: 700; color: #1C1C1E; }
    .sheet-close {
      width: 32px; height: 32px; border-radius: 50%; background: #E8EBF0; color: #8E8E93;
      display: flex; align-items: center; justify-content: center;
    }
    .sheet-body { padding: 20px 20px 40px; overflow-y: auto; max-height: calc(90vh - 80px); }

    /* Rating modal */
    .stars-input { display: flex; gap: 8px; margin: 16px 0; }
    .star-btn {
      font-size: 32px; cursor: pointer; opacity: .3; transition: opacity .15s, transform .1s;
    }
    .star-btn.active { opacity: 1; }
    .star-btn:active { transform: scale(1.2); }

    /* Admin tabs */
    .admin-tabs { display: flex; gap: 4px; padding: 8px 16px; overflow-x: auto; }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .admin-tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 600; color: #8E8E93;
      background: #fff; transition: background .15s, color .15s;
      cursor: pointer;
    }
    .admin-tab.active { background: #007AFF; color: #fff; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px; text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
    .empty-title { font-size: 17px; font-weight: 700; color: #1C1C1E; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: #8E8E93; line-height: 1.5; }

    /* Search bar */
    .search-wrap { padding: 8px 16px 4px; }
    .search-inner { position: relative; }
    .search-input {
      width: 100%; height: 38px; border-radius: 12px; background: #E8EBF0;
      padding: 0 14px 0 36px; font-size: 14px; color: #1C1C1E;
    }
    .search-input::placeholder { color: #8E8E93; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #8E8E93; }

    /* Spinner */

function navTo(screenId) {
  screenHistory = [];
  showScreen(screenId, false);

  if (screenId === 'screenFeed') loadFeed();
  else if (screenId === 'screenRequests') { loadPriceRequests(); loadMyBuyerRequests(); }
  else if (screenId === 'screenBuyerDeals') loadBuyerDeals();
  else if (screenId === 'screenCreateBuyerRequest') loadBuyerRequestForm();
  else if (screenId === 'screenMyOffers') loadMyOffers();
  else if (screenId === 'screenIncoming') { loadPublicBuyerRequests(); loadIncomingRequests(); loadIncomingDeals(); }
  else if (screenId === 'screenSupplierDeals') loadSupplierDeals();

function showScreen(id, pushHistory = true) {
  if (pushHistory && currentScreen) screenHistory.push(currentScreen);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  currentScreen = id;
  // Update nav highlight
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.screen === id);
  });
}

function goBack() {
  if (screenHistory.length) {
    const prev = screenHistory.pop();
    showScreen(prev, false);
  } else {
    // go to default
    navTo('screenFeed');
  }
}

// ===== API =====
async function api(path, opts = {}) {
  const r = await fetch(API_BASE + path, {
    headers: {'Content-Type': 'application/json'},
    ...opts
  });
  if (!r.ok) { const e = await r.json().catch(() => ({error: r.statusText})); throw new Error(e.error || r.statusText); }
  return r.json();
}

// ===== Supplier Badges =====
function getSupplierBadges(s) {
  const badges = [];
  if (s.is_verified) badges.push('<span class="badge badge-verified">✓ Проверен</span>');
  if (s.created_at) {
    const days = (Date.now() - new Date(s.created_at)) / 86400000;
    if (days < 30) badges.push('<span class="badge badge-new">Новый</span>');
  }
  if (s.rating >= 4.8 && s.deals_count >= 5) badges.push('<span class="badge badge-top">Топ рейтинг</span>');
  return badges.join('');
}

function starsHtml(rating) {
  if (!rating) return '<span style="color:#8E8E93;font-size:12px">Нет оценок</span>';
  const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
  return `<span style="color:#FF9500;font-size:12px">${stars}</span> <span style="font-size:12px;color:#8E8E93">${(+rating).toFixed(1)}</span>`;
}

function dealStatusLabel(status) {
  const map = {
    created: ['Новая', 'status-created'],
    confirmed: ['Подтверждена', 'status-confirmed'],
    completed: ['Завершена', 'status-completed'],
    rejected: ['Отклонена', 'status-rejected'],
    cancelled: ['Отменена', 'status-cancelled'],
  };
  const [label, cls] = map[status] || [status, 'status-created'];
  return `<span class="status-pill ${cls}">${label}</span>`;
}

function catEmoji(cat) {
  const map = {iPhone:'📱',iPad:'📟',Mac:'💻',Watch:'⌚',AirPods:'🎧','TV & Home':'📺',Vision:'🥽',Accessories:'🎁'};
  return map[cat] || '📦';
}

function renderFeedModelGroup(key, g, idx) {
  if (g.items.length === 1) {
    const item = g.items[0];
    return `
      <div class="product-card" onclick="openCatalogItem(${item.id}, '${esc(item.model)} ${esc(item.memory || '')}')">
        <div class="product-card-inner">
          <div class="product-img">${catEmoji(item.category)}</div>
          <div class="product-info">
            <div class="product-name">${esc(key)}</div>
            <div class="product-meta">${esc(item.memory || '')} ${esc(item.color || '')}</div>
            <div class="product-price-row">
              <div>
                ${item.min_price ? `<div class="product-price">от ${item.min_price.toLocaleString('ru')} ₽</div>` : '<div class="product-price hidden">Запросить цену</div>'}
              </div>
              <div class="product-rating">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="#FF9500" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                ${item.offers_count || 0} поставщ.
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }
  const priceText = g.globalMin && g.globalMax
    ? (g.globalMin === g.globalMax
      ? `${g.globalMin.toLocaleString('ru')} ₽`
      : `${g.globalMin.toLocaleString('ru')} – ${g.globalMax.toLocaleString('ru')} ₽`)
    : 'Запросить цену';
  const variants = g.items.map(item => {
    const varLabel = [item.memory, item.color].filter(Boolean).join(' · ') || 'Стандарт';
    const varPrice = item.min_price ? `от ${item.min_price.toLocaleString('ru')} ₽` : 'Запросить';
    return `
      <div class="group-item" onclick="event.stopPropagation();openCatalogItem(${item.id}, '${esc(item.model)} ${esc(item.memory || '')}')">
        <div>
          <div class="group-item-name">${esc(varLabel)}</div>
          <div class="group-item-sub">${item.offers_count || 0} поставщ.</div>
        </div>
        <div>
          <div class="group-item-price">${varPrice}</div>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="group-card" id="group_${idx}">
      <div class="group-header" onclick="toggleGroup('group_${idx}')">
        <div class="product-img">${catEmoji(g.items[0]?.category)}</div>
        <div class="group-info">
          <div class="group-model">${esc(key)}</div>
          <div class="group-meta">${g.items.length} вариант${g.items.length > 4 ? 'ов' : g.items.length > 1 ? 'а' : ''}</div>
          <div class="group-price">${priceText}</div>
          <div class="group-stats">
            <div class="group-badge">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="#FF9500" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              ${g.totalOffers} поставщ.
            </div>
          </div>
        </div>
        <svg class="group-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="group-items">${variants}</div>
    </div>`;
}

function renderFeed() {
  const el = document.getElementById('feedList');
  if (!feedData.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Нет предложений</div><div class="empty-sub">Попробуйте изменить фильтр</div></div>';
    return;
  }

  // Group by category first, then by model
  const byCategory = {};
  feedData.forEach(item => {
    const cat = item.category || 'Другое';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(item);
  });

  let groupIdx = 0;
  el.innerHTML = Object.entries(byCategory).map(([cat, items], catIdx) => {
    // Group items within category by model
    const modelGroups = {};
    items.forEach(item => {
      const key = (item.brand || '') + ' ' + (item.model || '');
      if (!modelGroups[key]) {
        modelGroups[key] = { brand: item.brand, model: item.model, items: [], totalOffers: 0, globalMin: null, globalMax: null };
      }
      const g = modelGroups[key];
      g.items.push(item);
      g.totalOffers += (item.offers_count || 0);
      if (item.min_price && (g.globalMin === null || item.min_price < g.globalMin)) g.globalMin = item.min_price;
      if (item.max_price && (g.globalMax === null || item.max_price > g.globalMax)) g.globalMax = item.max_price;
    });

    const totalOffers = items.reduce((s, i) => s + (i.offers_count || 0), 0);
    const modelsHtml = Object.entries(modelGroups).map(([key, g]) => renderFeedModelGroup(key, g, groupIdx++)).join('');

    return `
      <div class="cat-section" id="catSection_${catIdx}">
        <div class="cat-header" onclick="toggleCatSection('catSection_${catIdx}')">
          <span class="cat-header-emoji">${catEmoji(cat)}</span>
          <span class="cat-header-title">${esc(cat)}</span>
          <span class="cat-header-count">${totalOffers} поставщ.</span>
          <svg class="cat-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="cat-items">${modelsHtml}</div>
      </div>`;
  }).join('');
}

async function loadOfferList(catalogId) {
  const el = document.getElementById('offerListContent');

      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Нет предложений</div></div>';
      return;
    }
    el.innerHTML = offers.map(o => {
      const isOwnOffer = o.supplier_id === parseInt(userId);
      const isBlocked = myBlockedIds.includes(o.supplier_id);
      return `
      <div class="offer-row">
        <div class="offer-supplier-info">
          <div class="offer-company">${esc(o.company_name || o.full_name || 'Поставщик')}</div>
          <div class="offer-city">${esc(o.city || '')}</div>

          ${!isOwnOffer ? `<button class="btn-sm btn-secondary" style="margin-top:8px;font-size:11px;color:${isBlocked?'#34C759':'#FF3B30'}" onclick="toggleBlockUser(${o.supplier_id})">${isBlocked ? '✓ Разблокировать' : '⛔ Заблок. продавца'}</button>` : ''}
        </div>
        <div class="offer-price-col">
          ${o.price_hidden ? `
            <div style="font-size:12px;color:#8E8E93;margin-bottom:6px">Цена скрыта</div>
            <button class="btn-sm btn-orange" onclick="openRequestPriceSheet(${o.id})">Запросить</button>

            <div class="offer-price">${(o.price||0).toLocaleString('ru')} ₽</div>
            <div style="font-size:11px;color:#8E8E93;margin:3px 0">${o.quantity || 0} шт</div>

        </div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

  buyQty = Math.max(1, buyQty + delta);
  const el = document.getElementById('buyQty');

  const tot = document.getElementById('buyTotal');
  if (tot && activeOffer) tot.textContent = ((activeOffer.price||0) * buyQty).toLocaleString('ru') + ' ₽';
}

    const r = await api('/api/deals', {
      method: 'POST',
      body: JSON.stringify({buyer_id: parseInt(userId), offer_id: activeOffer.id, quantity: buyQty})

    closeSheet();
    showToast('✅ Заявка отправлена поставщику!');

function loadBuyerRequestForm() {
  const sel = document.getElementById('brModel');
  sel.innerHTML = '<option value="">-- Выберите модель --</option>' +
    Object.keys(CATALOG_MODELS).map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
  document.getElementById('brMemoryGroup').style.display = 'none';
  document.getElementById('brColorGroup').style.display = 'none';
}

function onBRModelChange() {
  const model = document.getElementById('brModel').value;
  const memSel = document.getElementById('brMemory');
  const memGroup = document.getElementById('brMemoryGroup');
  const colGroup = document.getElementById('brColorGroup');
  colGroup.style.display = 'none';
  if (!model || !CATALOG_MODELS[model]) { memGroup.style.display = 'none'; return; }
  const mems = CATALOG_MODELS[model].mem.filter(m => m);
  if (!mems.length) { memGroup.style.display = 'none'; return; }
  memSel.innerHTML = '<option value="">-- Выберите --</option>' + mems.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
  memGroup.style.display = '';
  const cols = CATALOG_MODELS[model].col.filter(c => c);
  if (!cols.length) return;
  document.getElementById('brColor').innerHTML = '<option value="">-- Выберите --</option>' + cols.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  colGroup.style.display = '';
}

async function submitBuyerRequest() {
  if (!userId) return;
  const model = document.getElementById('brModel').value;
  const memory = document.getElementById('brMemoryGroup').style.display === 'none' ? '' : document.getElementById('brMemory').value;
  const color = document.getElementById('brColorGroup').style.display === 'none' ? '' : document.getElementById('brColor').value;
  const quantity = parseInt(document.getElementById('brQuantity').value) || 1;
  const maxPrice = parseInt(document.getElementById('brMaxPrice').value) || null;
  const comment = document.getElementById('brComment').value.trim();
  if (!model) { showToast('Выберите модель'); return; }
  try {
    await api('/api/buyer_requests', {method:'POST', body: JSON.stringify({buyer_id: parseInt(userId), model, memory, color, quantity, max_price: maxPrice, comment})});
    showToast('✅ Запрос опубликован!');
    goBack();
    loadMyBuyerRequests();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

      el.innerHTML = '<div style="color:#8E8E93;font-size:14px;padding:12px 0">Нет активных запросов</div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="request-card">
        <div style="font-size:14px;font-weight:700;color:#1C1C1E">${esc(r.model)} ${esc(r.memory||'')} ${esc(r.color||'')}</div>
        <div style="font-size:12px;color:#8E8E93;margin-top:3px">Кол-во: ${r.quantity} шт${r.max_price ? ' · до ' + r.max_price.toLocaleString('ru') + ' ₽' : ''}</div>

async function viewRequestResponses(requestId, modelName) {
  const responses = await api(`/api/buyer_requests/${requestId}/responses`);
  if (!responses.length) { showToast('Ответов пока нет'); return; }
  const html = responses.map(r => {
    const statusLabel = r.status === 'accepted' ? '<div style="color:#34C759;font-weight:600;margin-top:6px">✅ Принято — контакт отправлен</div>'
      : r.status === 'rejected' ? '<div style="color:#8E8E93;margin-top:6px">❌ Отклонено</div>'
      : `<div class="deal-actions" style="margin-top:8px">
          <button class="btn-sm btn-green" onclick="acceptBuyerResponse(${r.id})">Принять ${r.price.toLocaleString('ru')} ₽</button>
          <button class="btn-sm btn-secondary" onclick="rejectBuyerResponse(${r.id})">Отклонить</button>
        </div>`;
    return `<div class="request-card">
      <div style="font-size:15px;font-weight:700;color:#1C1C1E">${r.price.toLocaleString('ru')} ₽</div>
      ${r.comment ? `<div style="font-size:13px;color:#8E8E93;margin-top:4px">${esc(r.comment)}</div>` : ''}
      ${statusLabel}
    </div>`;
  }).join('');
  openSheet(`Ответы: ${esc(modelName)}`, html);
}

// ===== Price Requests (buyer) =====
async function loadPriceRequests() {
  const el = document.getElementById('requestsList');
  if (!userId) { el.innerHTML = ''; return; }
  try {
    const list = await api('/api/buyer/price_requests?buyer_id=' + userId);
    if (!list.length) {
      el.innerHTML = '<div style="color:#8E8E93;font-size:14px;padding:12px 0">Нет активных запросов</div>';
      return;
    }
    el.innerHTML = list.map(r => {
      const statusMap = {pending:'⏳ Ожидание ответа', responded:'💰 Получена цена', expired:'⏰ Истёк', cancelled:'❌ Отменён'};
      let timerHtml = '';
      if (r.status === 'pending' && r.created_at) {
        const created = new Date(r.created_at + (r.created_at.endsWith('Z') ? '' : 'Z'));
        const expires = created.getTime() + 10 * 60 * 1000;
        const left = Math.max(0, Math.floor((expires - Date.now()) / 1000));
        if (left > 0) {
          const m = Math.floor(left / 60), s = left % 60;
          timerHtml = `<div class="request-timer" data-expires="${expires}" style="margin-top:6px">⏱ ${m}:${String(s).padStart(2,'0')}</div>`;
        } else {
          timerHtml = '<div style="margin-top:6px;font-size:12px;color:#FF3B30;font-weight:600">⏰ Время истекло</div>';
        }
      }
      return `
        <div class="request-card">
          <div style="font-size:14px;font-weight:700;color:#1C1C1E">${esc(r.model||'')} ${esc(r.memory||'')} ${esc(r.color||'')}</div>
          <div style="font-size:13px;font-weight:600;margin-top:8px;color:${r.status==='responded'?'#34C759':r.status==='pending'?'#FF9500':'#8E8E93'}">
            ${statusMap[r.status] || r.status}
            ${r.status === 'responded' ? ` — ${(r.buyer_price||0).toLocaleString('ru')} ₽/шт` : ''}
          </div>
          ${timerHtml}
          ${r.status === 'responded' ? `
            <div class="deal-actions" style="margin-top:10px">
              <button class="btn-sm btn-green" onclick="acceptPriceRequest(${r.id})">Принять ${(r.buyer_price||0).toLocaleString('ru')} ₽</button>
              <button class="btn-sm btn-secondary" onclick="rejectPriceRequest(${r.id})">Отклонить</button>
            </div>` : ''}
          ${r.status === 'accepted' ? `<div style="margin-top:8px;font-size:13px;color:#34C759;font-weight:600">✅ Принято — контакт отправлен поставщику</div>` : ''}
          ${r.status === 'rejected' ? `<div style="margin-top:8px;font-size:13px;color:#8E8E93">❌ Отклонено</div>` : ''}
        </div>`;
    }).join('');
    startPriceTimers();
  } catch(e) {
    el.innerHTML = '<div style="color:#8E8E93;font-size:13px">Ошибка загрузки</div>';
  }
}

let priceTimerInterval = null;
function startPriceTimers() {
  if (priceTimerInterval) clearInterval(priceTimerInterval);
  const timers = document.querySelectorAll('.request-timer[data-expires]');
  if (!timers.length) return;
  priceTimerInterval = setInterval(() => {
    let active = false;
    timers.forEach(el => {
      const expires = parseInt(el.dataset.expires);
      const left = Math.max(0, Math.floor((expires - Date.now()) / 1000));
      if (left > 0) {
        const m = Math.floor(left / 60), s = left % 60;
        el.textContent = `⏱ ${m}:${String(s).padStart(2, '0')}`;
        active = true;
      } else {
        el.textContent = '⏰ Время истекло';
        el.style.color = '#FF3B30';
        el.classList.remove('request-timer');
      }
    });
    if (!active) { clearInterval(priceTimerInterval); priceTimerInterval = null; loadPriceRequests(); }
  }, 1000);
}

const ACTIVE_STATUSES = ['created', 'confirmed'];
const HISTORY_STATUSES = ['completed', 'rejected', 'cancelled'];

async function loadBuyerDeals() {
  const elActive = document.getElementById('buyerDealsActive');
  const elHistory = document.getElementById('buyerDealsHistory');
  if (!userId) return;
  try {
    const deals = await api('/api/deals?telegram_id=' + userId);
    const active = deals.filter(d => ACTIVE_STATUSES.includes(d.status));
    const history = deals.filter(d => HISTORY_STATUSES.includes(d.status))
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    const roleFor = d => d.supplier_id === parseInt(userId) ? 'supplier' : 'buyer';
    elActive.innerHTML = active.length
      ? active.map(d => renderDealCard(d, roleFor(d))).join('')
      : '<div style="color:#8E8E93;font-size:14px;padding:8px 0">Нет активных сделок</div>';
    elHistory.innerHTML = history.length
      ? history.map(d => renderDealCard(d, roleFor(d))).join('')
      : '<div style="color:#8E8E93;font-size:14px;padding:8px 0">Пока пусто</div>';
  } catch(e) {
    elActive.innerHTML = '<div style="color:#8E8E93;font-size:13px">Ошибка загрузки</div>';
  }
}

function renderDealCard(d, role) {
  const canConfirm = role === 'supplier' && d.status === 'created';
  const canReject = (role === 'supplier' && ['created','confirmed'].includes(d.status)) || (role === 'buyer' && d.status === 'created');
  const canComplete = role === 'buyer' && d.status === 'confirmed';
  return `
    <div class="deal-card">
      <div class="deal-header">
        <div class="deal-id">#${d.id} · ${new Date(d.created_at).toLocaleDateString('ru')}</div>
        ${dealStatusLabel(d.status)}
      </div>
      <div class="deal-product">${esc(d.model||'')} ${esc(d.memory||'')} ${esc(d.color||'')}</div>
      <div class="deal-meta">${role==='buyer'?'Поставщик: '+esc(d.counterparty||''):'Покупатель: '+esc(d.counterparty||'')}</div>
      <div class="deal-price">${(d.total_price||0).toLocaleString('ru')} ₽ · ${d.quantity} шт</div>
      <div class="deal-actions">
        ${canConfirm ? `<button class="btn-sm btn-green" onclick="updateDealStatus(${d.id},'confirmed')">Подтвердить</button>` : ''}
        ${canComplete ? `<button class="btn-sm btn-green" onclick="updateDealStatus(${d.id},'completed')">Завершить</button>` : ''}
        ${canReject ? `<button class="btn-sm btn-red" onclick="updateDealStatus(${d.id},'${role==='buyer'?'cancelled':'rejected'}')">Отклонить</button>` : ''}
        ${d.status === 'completed' && d.buyer_id === parseInt(userId) ? (d._buyer_reviewed ? `<span style="color:#8E8E93;font-size:12px">Поставщик оценён</span>` : `<button class="btn-sm btn-secondary" onclick="openRatingSheet(${d.id}, ${d.supplier_id}, ${d.buyer_id}, 'buyer')">Оценить поставщика</button>`) : ''}
        ${d.status === 'completed' && d.supplier_id === parseInt(userId) ? (d._supplier_reviewed ? `<span style="color:#8E8E93;font-size:12px">Покупатель оценён</span>` : `<button class="btn-sm btn-secondary" onclick="openRatingSheet(${d.id}, ${d.supplier_id}, ${d.buyer_id}, 'supplier')">Оценить покупателя</button>`) : ''}
      </div>
    </div>`;
}

async function updateDealStatus(dealId, status) {
  if (!userId) return;
  try {
    await api(`/api/deals/${dealId}/status`, {
      method: 'POST',
      body: JSON.stringify({user_id: parseInt(userId), status})
    });
    showToast('✅ Статус обновлён');
    loadIncomingDeals(); loadBuyerDeals();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

// ===== Rating Sheet =====
let ratingVal = 0;
let reviewMeta = {};
function openRatingSheet(dealId, supplierId, buyerId, authorRole) {
  ratingVal = 0;
  reviewMeta = {dealId, supplierId, buyerId, authorRole};
  const label = authorRole === 'buyer' ? 'Оцените поставщика' : 'Оцените покупателя';
  openSheet('Оставить отзыв', `
    <div style="font-size:14px;color:#8E8E93;margin-bottom:8px">${label} по сделке #${dealId}</div>
    <div class="stars-input" id="starsInput">
      ${[1,2,3,4,5].map(i=>`<button class="star-btn" data-val="${i}" onclick="setRating(${i})">★</button>`).join('')}
    </div>
    <textarea class="form-textarea" id="reviewComment" rows="3" placeholder="Ваш комментарий (необязательно)..."></textarea>
    <button class="btn-full btn-primary" style="margin-top:16px" onclick="submitReview()">Отправить отзыв</button>
  `);
}

function setRating(val) {
  ratingVal = val;
  document.querySelectorAll('.star-btn').forEach((b, i) => {
    b.classList.toggle('active', i < val);
  });
}

async function submitReview() {
  if (!userId || !ratingVal) { showToast('Выберите оценку'); return; }
  const comment = document.getElementById('reviewComment')?.value || '';
  const {dealId, supplierId, buyerId, authorRole} = reviewMeta;
  try {
    await api('/api/reviews', {
      method: 'POST',
      body: JSON.stringify({deal_id: dealId, supplier_id: supplierId, buyer_id: buyerId, rating: ratingVal, comment, author_role: authorRole})
    });
    closeSheet();
    showToast('✅ Отзыв отправлен!');
    // Reload all deal lists to update reviewed flags
    loadIncomingDeals(); loadBuyerDeals();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

// ===== MY OFFERS (supplier) =====
async function loadMyOffers() {
  const el = document.getElementById('myOffersList');
  if (!userId) { el.innerHTML = ''; return; }
  try {
    const offers = await api('/api/supplier/offers?telegram_id=' + userId);
    if (!offers.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Нет офферов</div><div class="empty-sub">Создайте первый оффер</div></div>';
      return;
    }

    // Group by category (catalog items have brand field; use catEmoji for icon)
    const byCategory = {};
    offers.forEach(o => {
      const cat = o.category || 'Другое';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(o);
    });

    function renderMyOffer(o) {
      return `
        <div class="my-offer-card">
          <div class="my-offer-header">
            <div>
              <div class="my-offer-name">${esc(o.brand||'')} ${esc(o.model||'')} ${esc(o.memory||'')} ${esc(o.color||'')}</div>
              <div class="my-offer-meta">${o.quantity||0} шт · ${o.condition||''}</div>
            </div>
            <div class="my-offer-price ${o.price_hidden?'hidden-price':''}">${(o.price||0).toLocaleString('ru')} ₽</div>
          </div>
          ${o.price_hidden ? '<div style="font-size:11px;color:#FF9500;margin-top:4px;font-weight:600">🔒 Цена скрыта</div>' : ''}
          <div class="my-offer-actions">
            <button class="btn-sm btn-secondary" onclick="openEditOffer(${o.id}, ${o.price||0}, ${o.quantity||0})">✏️ Цена</button>
            <button class="btn-sm btn-secondary" onclick="togglePrice(${o.id})">
              ${o.price_hidden ? '👁 Показать' : '🔒 Скрыть'}
            </button>
            <button class="btn-sm btn-red" onclick="deleteOffer(${o.id})">Удалить</button>
          </div>
        </div>`;
    }

    el.innerHTML = Object.entries(byCategory).map(([cat, catOffers], catIdx) => `
      <div class="cat-section" id="myOfferCat_${catIdx}">
        <div class="cat-header" onclick="toggleCatSection('myOfferCat_${catIdx}')">
          <span class="cat-header-emoji">${catEmoji(cat)}</span>
          <span class="cat-header-title">${esc(cat)}</span>
          <span class="cat-header-count">${catOffers.length} поз.</span>
          <svg class="cat-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="cat-items">${catOffers.map(renderMyOffer).join('')}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function togglePrice(offerId) {
  if (!userId) return;
  try {
    const r = await api(`/api/supplier/offers/${offerId}/toggle_price`, {
      method: 'POST',
      body: JSON.stringify({telegram_id: parseInt(userId)})
    });
    showToast(r.price_hidden ? '🔒 Цена скрыта' : '👁 Цена видна покупателям');
    loadMyOffers();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

async function saveOffer(offerId) {
  const price = parseInt(document.getElementById('editOfferPrice').value);
  const quantity = parseInt(document.getElementById('editOfferQty').value);
  if (!price || price < 1) { showToast('Введите корректную цену'); return; }

function onCatalogModelChange() {
  const model = document.getElementById('createOfferModel').value;
  const memSel = document.getElementById('createOfferMemory');
  const memGroup = document.getElementById('createOfferMemoryGroup');
  const colGroup = document.getElementById('createOfferColorGroup');
  document.getElementById('createOfferCatalogId').value = '';
  colGroup.style.display = 'none';
  if (!model || !CATALOG_MODELS[model]) { memGroup.style.display = 'none'; return; }

function onCatalogMemoryChange() {
  const model = document.getElementById('createOfferModel').value;
  const memory = document.getElementById('createOfferMemory').value;
  document.getElementById('createOfferCatalogId').value = '';
  if (!model) return;
  _showColorSelector(model, memory);
}

function _showColorSelector(model, memory) {
  const colSel = document.getElementById('createOfferColor');
  const colGroup = document.getElementById('createOfferColorGroup');
  document.getElementById('createOfferCatalogId').value = '';
  if (!CATALOG_MODELS[model]) { colGroup.style.display = 'none'; return; }
  const colors = CATALOG_MODELS[model].col.filter(c => c);
  if (!colors.length) {
    colGroup.style.display = 'none';
    // нет цвета — запись полная
    document.getElementById('createOfferCatalogId').value = JSON.stringify({model, memory, color:''});
    return;
  }
  colSel.innerHTML = '<option value="">-- Выберите --</option>' +
    colors.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  colGroup.style.display = '';
}

function onCatalogColorChange() {
  const model = document.getElementById('createOfferModel').value;
  // Если поле памяти скрыто — не используем его значение (может быть стale от предыдущей модели)
  const memGroup = document.getElementById('createOfferMemoryGroup');
  const memory = memGroup.style.display === 'none' ? '' : document.getElementById('createOfferMemory').value;
  const color = document.getElementById('createOfferColor').value;
  if (model && color) {
    document.getElementById('createOfferCatalogId').value = JSON.stringify({model, memory, color});

}

async function submitCreateOffer() {
  if (!userId) return;
  const catalogRaw = document.getElementById('createOfferCatalogId')?.value;
  const price = parseInt(document.getElementById('createOfferPrice')?.value) || 0;
  const qty = parseInt(document.getElementById('createOfferQty')?.value) || 0;
  const condition = document.getElementById('createOfferCondition')?.value || 'new';
  const priceHidden = document.getElementById('createOfferHidePrice')?.checked ? 1 : 0;
  const comment = document.getElementById('createOfferComment')?.value || '';
  if (!catalogRaw || !price) { showToast('Выберите товар и укажите цену'); return; }
  let catalogSel;
  try { catalogSel = JSON.parse(catalogRaw); } catch(e) { showToast('Выберите товар'); return; }
  try {
    await api('/api/supplier/offers', {
      method: 'POST',
      body: JSON.stringify({telegram_id: parseInt(userId), model: catalogSel.model, memory: catalogSel.memory||'', color: catalogSel.color||'', price, quantity: qty, comment})
    });
    if (priceHidden) {
      // get last offer and toggle
      const offers = await api('/api/supplier/offers?telegram_id=' + userId);
      const last = offers[offers.length - 1];
      if (last) await api(`/api/supplier/offers/${last.id}/toggle_price`, {method:'POST', body: JSON.stringify({telegram_id: parseInt(userId)})});
    }
    showToast('✅ Оффер опубликован!');
    goBack();
    loadMyOffers();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

// ===== INCOMING (supplier) =====
async function loadIncomingRequests() {
  const el = document.getElementById('incomingRequestsList');
  if (!userId) return;
  try {
    const reqs = await api('/api/price_requests?supplier_id=' + userId);
    if (!reqs.length) {
      el.innerHTML = '<div style="color:#8E8E93;font-size:14px;padding:8px 0">Нет входящих запросов</div>';
      return;
    }
    el.innerHTML = reqs.map(r => {
      let timerHtml = '';
      if (r.created_at) {
        const created = new Date(r.created_at + (r.created_at.endsWith('Z') ? '' : 'Z'));
        const expires = created.getTime() + 10 * 60 * 1000;
        const left = Math.max(0, Math.floor((expires - Date.now()) / 1000));
        if (left > 0) {
          const m = Math.floor(left / 60), s = left % 60;
          timerHtml = `<div class="request-timer" data-expires="${expires}" style="margin-top:4px">⏱ Осталось: ${m}:${String(s).padStart(2,'0')}</div>`;
        } else {
          timerHtml = '<div style="margin-top:4px;font-size:12px;color:#FF3B30;font-weight:600">⏰ Время истекло</div>';
        }
      }
      return `
      <div class="request-card">
        <div style="font-size:14px;font-weight:700;color:#1C1C1E">${esc(r.model||'')} ${esc(r.memory||'')} ${esc(r.color||'')}</div>
        <div style="font-size:13px;color:#8E8E93;margin-top:3px">Покупатель: ${esc(r.buyer_name||r.buyer_username||'')}</div>
        <div style="font-size:12px;color:#8E8E93">Количество: ${r.quantity} шт</div>
        ${timerHtml}
        <div class="deal-actions" style="margin-top:10px">
          <input class="form-input" type="number" id="respPrice_${r.id}" placeholder="Цена ₽" style="height:38px;font-size:14px;width:130px">
          <button class="btn-sm btn-green" onclick="respondRequest(${r.id})">Ответить</button>
        </div>
      </div>`;
    }).join('');
    startPriceTimers();
  } catch(e) {
    el.innerHTML = '<div style="color:#8E8E93;font-size:13px">Ошибка загрузки</div>';
  }
}

async function respondRequest(requestId) {
  if (!userId) return;
  const price = parseInt(document.getElementById('respPrice_' + requestId)?.value) || 0;
  if (!price) { showToast('Укажите цену'); return; }
  try {

async function loadSupplierDeals() {
  const elActive = document.getElementById('supplierDealsActive');
  const elHistory = document.getElementById('supplierDealsHistory');
  if (!userId) return;
  try {
    const deals = await api('/api/deals?telegram_id=' + userId);
    const myDeals = deals.filter(d => d.supplier_id === parseInt(userId));
    const active = myDeals.filter(d => ACTIVE_STATUSES.includes(d.status));
    const history = myDeals.filter(d => HISTORY_STATUSES.includes(d.status))
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    elActive.innerHTML = active.length
      ? active.map(d => renderDealCard(d, 'supplier')).join('')
      : '<div style="color:#8E8E93;font-size:14px;padding:8px 0">Нет активных сделок</div>';
    elHistory.innerHTML = history.length
      ? history.map(d => renderDealCard(d, 'supplier')).join('')
      : '<div style="color:#8E8E93;font-size:14px;padding:8px 0">Пока пусто</div>';

    elActive.innerHTML = `<div style="color:#8E8E93;font-size:13px">${e.message}</div>`;

function downloadTemplate() {

  if (tg && tg.openLink) {
    tg.openLink(url);

async function uploadImport() {
  const file = document.getElementById('importFile')?.files[0];
  if (!file || !userId) return;
  const fd = new FormData();
  fd.append('telegram_id', userId);
  fd.append('file', file);
  try {
    const r = await fetch(API_BASE + '/api/supplier/import', {method:'POST', body: fd});
    const data = await r.json();
    closeSheet();
    showToast(data.message || '✅ Импорт выполнен');
    loadMyOffers();

    showToast('Ошибка импорта: ' + e.message);

    loadPriceRequests();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

async function rejectPriceRequest(requestId) {
  if (!userId) return;
  try {
    await api(`/api/price_request/${requestId}/reject`, {
      method: 'POST',
      body: JSON.stringify({buyer_id: parseInt(userId)})
    });
    showToast('Запрос отклонён');
    loadPriceRequests();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

// ===== CREATE DEAL API =====
async function buyFromRequest(requestId, offerId, price, quantity) {
  if (!userId) return;
  // get offer to get supplier_id
  try {
    const offer = await api('/api/offers/' + offerId);
    const dealResp = await api('/api/deals', {
      method:'POST',
      body: JSON.stringify({buyer_id: parseInt(userId), offer_id: offerId, quantity: quantity||1})
    });
    showToast('✅ Сделка создана!');
    loadPriceRequests(); loadBuyerDeals();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

// ===== ADMIN =====
let activeAdminTab = 'adminUsers';
function switchAdminTab(btn) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const tabId = btn.dataset.tab;
  document.querySelectorAll('#screenAdmin .section-pad > div').forEach(el => el.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
  activeAdminTab = tabId;
  loadAdminTab(tabId);
}

async function loadAdminTab(tabId) {
  if (tabId === 'adminUsers') await loadAdminUsers();
  else if (tabId === 'adminDeals') await loadAdminDeals();
  else if (tabId === 'adminReviews') await loadAdminReviews();
  else if (tabId === 'adminCatalog') await loadAdminCatalog();
}

async function loadAdminDeals() {
  const el = document.getElementById('adminDeals');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const deals = await api('/api/admin/deals?admin_id=' + userId);
    if (!deals.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Нет сделок</div></div>'; return; }
    el.innerHTML = deals.map(d => `
      <div class="deal-card">
        <div class="deal-header">
          <div class="deal-id">#${d.id} · ${new Date(d.created_at).toLocaleDateString('ru')}</div>
          ${dealStatusLabel(d.status)}
        </div>
        <div class="deal-product">${esc(d.model||'')} ${esc(d.memory||'')} ${esc(d.color||'')}</div>
        <div class="deal-meta">Покупатель: ${esc(d.buyer_name||d.buyer_username||'')} → Поставщик: ${esc(d.supplier_company||'')}</div>
        <div class="deal-price">${(d.total_price||0).toLocaleString('ru')} ₽</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function loadAdminReviews() {
  const el = document.getElementById('adminReviews');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const reviews = await api('/api/admin/reviews?admin_id=' + userId);
    if (!reviews.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">Нет отзывов</div></div>'; return; }
    el.innerHTML = reviews.map(r => `
      <div class="card" style="margin-bottom:8px">
        <div class="card-body" style="padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:13px;font-weight:600;color:#1C1C1E">Сделка #${r.deal_id} · ${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
              <div style="font-size:12px;color:#8E8E93;margin-top:2px">
                ${r.author_role === 'buyer' ? 'Покупатель' : 'Поставщик'}:
                ${esc(r.author_role === 'buyer' ? (r.buyer_name || r.buyer_username || '—') : (r.supplier_company || r.supplier_username || '—'))}
                → ${r.author_role === 'buyer' ? esc(r.supplier_company || r.supplier_username || '—') : esc(r.buyer_name || r.buyer_username || '—')}
              </div>
              ${r.comment ? `<div style="font-size:12px;color:#636366;margin-top:4px">${esc(r.comment)}</div>` : ''}
              <div style="font-size:11px;color:#AEAEB2;margin-top:4px">${new Date(r.created_at).toLocaleString('ru')}</div>
            </div>
            <button class="btn-sm btn-red" onclick="adminDeleteReview(${r.id})" style="flex-shrink:0;margin-left:8px">Удалить</button>
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function adminDeleteReview(reviewId) {
  if (!confirm('Удалить этот отзыв? Рейтинг пользователя будет пересчитан.')) return;
  try {
    await api(`/api/admin/reviews/${reviewId}?admin_id=${userId}`, {method: 'DELETE'});
    showToast('✅ Отзыв удалён');
    loadAdminReviews();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  }
}

async function loadAdminUsers() {
  const el = document.getElementById('adminUsers');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const users = await api('/api/admin/users?admin_id=' + userId);
    if (!users.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Нет пользователей</div></div>'; return; }
    el.innerHTML = users.map(u => `
      <div class="card" style="margin-bottom:8px${u.is_blocked ? ';opacity:0.6' : ''}">
        <div class="card-body" style="display:flex;align-items:center;gap:12px">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600">${esc(u.full_name || 'Без имени')}${u.username ? ` · <a href="https://t.me/${u.username}" target="_blank" style="color:#007AFF;text-decoration:none">@${esc(u.username)}</a>` : ''}${u.is_blocked ? ' <span style="color:#FF3B30;font-size:11px">заблокирован</span>' : ''}</div>
            <div style="font-size:12px;color:#8E8E93">ID: ${u.telegram_id}${u.rating ? ' · ★ '+u.rating.toFixed(1) : ''}${u.company_name ? ' · '+esc(u.company_name) : ''}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn-sm ${u.is_blocked ? 'btn-green' : 'btn-secondary'}" onclick="adminToggleBlock(${u.telegram_id}, ${u.is_blocked ? 0 : 1})">${u.is_blocked ? 'Разблок.' : 'Блок.'}</button>
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function adminToggleBlock(telegramId, blocked) {
  try {
    await api('/api/admin/user/block', {method:'POST', body: JSON.stringify({admin_id: parseInt(userId), telegram_id: telegramId, blocked: !!blocked})});
    showToast(blocked ? '🚫 Пользователь заблокирован' : '✅ Пользователь разблокирован');
    loadAdminUsers();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function loadAdminCatalog() {
  const el = document.getElementById('adminCatalog');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const items = await api('/api/admin/catalog?admin_id=' + userId);
    const byCategory = {};
    items.forEach(it => {
      const cat = it.category || 'Другое';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(it);
    });
    const cats = [...new Set(Object.values(CATALOG_MODELS).map(v => v.cat))];
    el.innerHTML = `
      <div style="margin-bottom:16px">
        <div class="section-title" style="margin-bottom:8px">Добавить позицию</div>
        <div style="display:grid;gap:8px">
          <select class="form-input" id="adminCatCat" style="height:40px">
            <option value="">Категория</option>
            ${cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('')}
          </select>
          <input class="form-input" id="adminCatModel" placeholder="Модель (напр. iPhone 16 Pro)" style="height:40px">
          <input class="form-input" id="adminCatMemory" placeholder="Память / конфиг (напр. 256GB)" style="height:40px">
          <input class="form-input" id="adminCatColor" placeholder="Цвет (напр. Black Titanium)" style="height:40px">
          <button class="btn-full btn-primary" onclick="adminAddCatalogItem()" style="height:40px;border-radius:12px">Добавить</button>
        </div>
      </div>
      <div class="section-title" style="margin-bottom:8px">Каталог (${items.length} позиций)</div>
      ${Object.entries(byCategory).map(([cat, citems], ci) => `
        <div class="cat-section" id="admCat_${ci}">
          <div class="cat-header" onclick="toggleCatSection('admCat_${ci}')">
            <span class="cat-header-emoji">${catEmoji(cat)}</span>
            <span class="cat-header-title">${esc(cat)}</span>
            <span class="cat-header-count">${citems.length} поз.</span>
            <svg class="cat-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="cat-items">
            ${citems.map(it => `
              <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F2F2F7;${it.is_active?'':'opacity:0.5'}">
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:600;color:#1C1C1E">${esc(it.model||'')} ${esc(it.memory||'')} ${esc(it.color||'')}</div>
                  <div style="font-size:11px;color:#8E8E93">SKU: ${esc(it.sku||'')} · ${it.offers_count||0} офф. ${it.is_active?'':'· неактивен'}</div>
                </div>
                <button class="btn-sm btn-secondary" style="flex-shrink:0" onclick="adminToggleCatalogItem(${it.id})">${it.is_active?'👁 Скрыть':'👁 Показать'}</button>
                <button class="btn-sm btn-red" style="flex-shrink:0" onclick="adminDeleteCatalogItem(${it.id},${it.offers_count||0})"
                  ${(it.offers_count||0)>0?'disabled title="Есть офферы"':''}
                >Удалить</button>
              </div>`).join('')}
          </div>
        </div>`).join('')}`;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">${e.message}</div></div>`;
  }
}

async function adminAddCatalogItem() {
  const category = document.getElementById('adminCatCat')?.value;
  const model = document.getElementById('adminCatModel')?.value?.trim();
  const memory = document.getElementById('adminCatMemory')?.value?.trim();
  const color = document.getElementById('adminCatColor')?.value?.trim();
  if (!category || !model) { showToast('Укажите категорию и модель'); return; }
  try {
    await api('/api/admin/catalog', {method:'POST', body: JSON.stringify({admin_id: parseInt(userId), category, model, memory, color})});
    showToast('✅ Позиция добавлена');
    loadAdminCatalog();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function adminToggleCatalogItem(itemId) {
  try {
    await api(`/api/admin/catalog/${itemId}/toggle`, {method:'PATCH', body: JSON.stringify({admin_id: parseInt(userId)})});
    loadAdminCatalog();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function adminDeleteCatalogItem(itemId, offersCount) {
  if (offersCount > 0) { showToast('Нельзя удалить — есть офферы'); return; }
  if (!confirm('Удалить позицию из каталога?')) return;
  try {
    await api(`/api/admin/catalog/${itemId}?admin_id=${userId}`, {method:'DELETE'});
    showToast('✅ Удалено');
    loadAdminCatalog();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function toggleSalesPause(paused) {
  try {
    await api('/api/user/sales_pause', {method:'POST', body: JSON.stringify({telegram_id: parseInt(userId), paused: !!paused})});
    showToast(paused ? '⏸ Продажи приостановлены' : '▶ Продажи возобновлены');
    loadMyProfile();
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function toggleBlockUser(targetId) {
  const isBlocked = myBlockedIds.includes(targetId);
  try {
    if (isBlocked) {
      await api('/api/user/unblock', {method:'POST', body: JSON.stringify({blocker_id: parseInt(userId), blocked_id: targetId})});
      myBlockedIds = myBlockedIds.filter(id => id !== targetId);
      showToast('✅ Пользователь разблокирован');
    } else {
      await api('/api/user/block', {method:'POST', body: JSON.stringify({blocker_id: parseInt(userId), blocked_id: targetId})});
      myBlockedIds.push(targetId);
      showToast('⛔ Продавец заблокирован — его офферы скрыты');
    }
    // Reload current offer list to update buttons
    if (activeCatalogItem) loadOfferList(activeCatalogItem.id);
    loadFeed();
  } catch(e) { showToast('Ошибка: '+e.message); }
}


// ===== Utils =====
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateHeaderBadge() {
  const badge = document.getElementById('headerRoleBadge');
  const sub = document.getElementById('headerSub');
  if (isAdmin) { badge.textContent = 'Админ'; badge.className = 'header-role-badge admin'; }
  else { badge.textContent = ''; badge.className = 'header-role-badge'; }
  if (sub) sub.textContent = 'Apple техника';
}

// ===== Role helpers (removed — all users are equal) =====

// ===== INIT =====
async function init() {
  if (!userId) {
    document.getElementById('roleOverlay').className = 'role-overlay';
    document.getElementById('roleOverlay').innerHTML = `
      <div class="empty-state" style="padding-top:80px">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">Откройте через бот</div>
        <div class="empty-sub">Используйте команду /start в Telegram-боте для входа</div>
      </div>`;
    return;
  }

  isAdmin = ADMIN_IDS.includes(String(userId));

  try {
    [currentUser, myBlockedIds] = await Promise.all([
      api('/api/user?telegram_id=' + userId),
      api('/api/user/blocks?telegram_id=' + userId).catch(() => [])
    ]);
  } catch(e) {
    currentUser = null;
  }

  if (currentUser?.is_blocked && !isAdmin) {
    document.getElementById('roleOverlay').className = 'role-overlay';
    document.getElementById('roleOverlay').innerHTML = `
      <div class="empty-state" style="padding-top:80px">
        <div class="empty-icon">🚫</div>
        <div class="empty-title">Доступ заблокирован</div>
        <div class="empty-sub">Ваш аккаунт заблокирован администратором</div>
      </div>`;
    return;
  }

  startApp();
}

function startApp() {
  document.getElementById('roleOverlay').classList.add('hidden');
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('bottomNav').style.display = 'block';
  updateHeaderBadge();
  buildNav();

  navTo('screenFeed');
  loadCatalogForCreate();
}

init();
</script>
